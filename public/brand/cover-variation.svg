<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Variation Control">
  <defs>
    <linearGradient id="bgvc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#de5123"/>
      <stop offset="1" stop-color="#9a2a06"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bgvc)"/>

  <!-- Stamp container -->
  <g transform="rotate(-6 800 500)">
    <rect x="200" y="280" width="1200" height="440" rx="18" fill="none" stroke="#ffffff" stroke-width="6"/>
    <rect x="220" y="300" width="1160" height="400" rx="10" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>
    <text x="800" y="540" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', Helvetica, Arial, sans-serif" font-weight="500" font-size="220" letter-spacing="-4" fill="#ffffff">VARIATION</text>
    <text x="800" y="650" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', Helvetica, Arial, sans-serif" font-size="36" letter-spacing="14" fill="#ffffff">PRICED · APPROVED · INVOICED</text>
  </g>

  <!-- Eyebrow -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', Helvetica, Arial, sans-serif">
    <text x="80" y="120" font-size="22" letter-spacing="5" fill="#ffffff" opacity="0.8">OPERATOR HANDBOOK</text>
    <text x="80" y="170" font-size="34" letter-spacing="-0.5" fill="#ffffff">The system that removes discretion</text>
  </g>

  <!-- Bottom checklist -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', Helvetica, Arial, sans-serif" font-size="22" letter-spacing="3" fill="#ffffff">
    <g transform="translate(80 880)">
      <text x="0" y="0" letter-spacing="6">NO WORK PROCEEDS WITHOUT A SIGNED VARIATION ORDER.</text>
    </g>
  </g>

  <!-- Eagle mark -->
  <g transform="translate(1400 820)" opacity="0.95">
    <circle cx="60" cy="60" r="60" fill="#0c0d11"/>
    <path d="M30 70 q15 -25 50 -22 q-12 8 -18 22 q22 -8 36 -2 q-18 12 -38 14 z" fill="#ffffff"/>
    <circle cx="78" cy="50" r="3" fill="#ffffff"/>
  </g>
</svg>
