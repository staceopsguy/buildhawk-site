<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Why Every Builder Underprices Sitework in Year One">
  <defs>
    <linearGradient id="bgsw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0eb"/>
      <stop offset="1" stop-color="#ffe2d6"/>
    </linearGradient>
    <pattern id="hatch" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#de5123" stroke-width="2" stroke-opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bgsw)"/>
  <rect width="1600" height="1000" fill="url(#hatch)"/>

  <!-- Site cut profile -->
  <g>
    <path d="M0 800 L260 800 L380 700 L640 700 L760 600 L1040 600 L1160 720 L1380 720 L1480 800 L1600 800 L1600 1000 L0 1000 Z" fill="#9a2a06" fill-opacity="0.92"/>
    <path d="M0 800 L260 800 L380 700 L640 700 L760 600 L1040 600 L1160 720 L1380 720 L1480 800 L1600 800" fill="none" stroke="#0c0d11" stroke-width="3"/>
  </g>

  <!-- Datum line -->
  <line x1="0" y1="800" x2="1600" y2="800" stroke="#0c0d11" stroke-width="1" stroke-dasharray="6 8" opacity="0.5"/>

  <!-- Eyebrow -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', Helvetica, Arial, sans-serif">
    <text x="80" y="100" font-size="22" letter-spacing="5" fill="#9a2a06">OPERATOR HANDBOOK · SITEWORK</text>
    <text x="80" y="148" font-size="30" letter-spacing="-0.5" fill="#0c0d11">Excavation · Drainage · Retaining · Clean</text>
  </g>

  <!-- Big delta -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', Helvetica, Arial, sans-serif">
    <text x="80" y="500" font-weight="500" font-size="420" letter-spacing="-18" fill="#0c0d11">+22%</text>
    <text x="100" y="555" font-size="22" letter-spacing="5" fill="#0c0d11" opacity="0.7">AVERAGE OVERRUN · FIRST JOB IN A NEW REGION</text>
  </g>

  <!-- Tag chips -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', Helvetica, Arial, sans-serif" font-size="18" letter-spacing="3">
    <g transform="translate(80 900)">
      <rect width="220" height="44" rx="22" fill="#0c0d11"/>
      <text x="110" y="29" text-anchor="middle" fill="#ffffff">P-CLASS · +$18K</text>
    </g>
    <g transform="translate(320 900)">
      <rect width="240" height="44" rx="22" fill="#0c0d11"/>
      <text x="120" y="29" text-anchor="middle" fill="#ffffff">RETAINING · $1,400/m</text>
    </g>
    <g transform="translate(580 900)">
      <rect width="240" height="44" rx="22" fill="#0c0d11"/>
      <text x="120" y="29" text-anchor="middle" fill="#ffffff">STORMWATER · 40m</text>
    </g>
  </g>

  <!-- Eagle mark -->
  <g transform="translate(1400 880)" opacity="0.95">
    <circle cx="50" cy="50" r="50" fill="#0c0d11"/>
    <path d="M25 58 q12 -22 42 -19 q-10 7 -16 19 q19 -7 30 -2 q-15 10 -32 12 z" fill="#de5123"/>
    <circle cx="65" cy="42" r="2.6" fill="#de5123"/>
  </g>
</svg>
